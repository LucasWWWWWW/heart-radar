<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关系雷达 · 心动雷达</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>♡ 心动雷达</h1>
        <span class="tag">/ 关系雷达</span>
      </div>
      <div class="header-right">
        <button class="header-action" id="theme-btn">☀ 浅色</button>
      </div>
    </div>
  </header>

  <main>
    <a href="index.html" class="back-link">← 返回首页</a>

    <div class="two-col">
      <!-- 左:输入 -->
      <section class="card">
        <h2>📋 6 个观察维度 <span class="hint">拖动滑块,实时计算</span></h2>
        <div id="dim-list"></div>
      </section>

      <!-- 右:结果 -->
      <section>
        <div class="card">
          <h2>📊 当前评估</h2>
          <div class="score-display">
            <div class="score-big" id="score-big">0</div>
            <div class="score-label">关心指数 / 100</div>
            <div class="stage-badge" id="stage-badge">陌生人</div>
            <div class="stage-summary" id="stage-summary"></div>
          </div>
          <div class="btn-row">
            <button class="btn" id="save-btn">📌 保存这次记录</button>
            <button class="btn secondary" id="reset-btn">重置</button>
          </div>
        </div>

        <div class="card">
          <h2>
            🌱 下一步可以做的事
            <span class="suggest-tools">
              <button class="btn-mini" id="ai-suggest-btn" title="用 Claude API 重新生成个性化建议">🤖 AI 生成</button>
              <button class="btn-mini-icon" id="ai-settings-btn" title="设置 API key">⚙</button>
            </span>
          </h2>
          <div class="ai-source-hint hidden" id="ai-source"></div>
          <ul class="suggest-list" id="suggest-list"></ul>
          <h2 style="margin-top:18px;font-size:14px;color:var(--red);">⚠ 这些事最好别做</h2>
          <ul class="avoid-list" id="avoid-list"></ul>
        </div>

        <div class="card">
          <h2>📈 历史变化 <span class="hint">仅保存在你本机</span></h2>
          <div id="history-area">
            <div class="history-empty">还没有保存过记录。改完滑块后点"保存这次记录"。</div>
          </div>
          <div class="btn-row">
            <button class="btn danger" id="clear-history-btn" style="display:none">清空历史</button>
          </div>
        </div>
      </section>
    </div>

    <p class="disclaimer">
      建议仅供参考,不能替代真实沟通。关系的复杂程度远超 6 个维度,把这里的判断当作"练习观察"的起点,而不是结论。
    </p>
  </main>

  <script src="js/common.js"></script>
  <script src="js/radar-rules.js"></script>
  <script src="js/radar.js"></script>
</body>
</html>
